version: 2

project_name: distill

before:
  hooks:
    - go mod tidy

builds:
  - id: distill
    main: ./cmd/distill
    binary: distill
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=pdfium
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "distill_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/**/*

checksum:
  name_template: "distill_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  header: |
    ## distill {{ .Version }}

    Single-binary document → Markdown engine for LLM/RAG pipelines.

    Install with one command:
    ```bash
    curl -fsSL https://raw.githubusercontent.com/MitudruDutta/distill/main/install.sh | bash
    ```
  footer: |
    **Full Changelog**: https://github.com/MitudruDutta/distill/compare/{{ .PreviousTag }}...{{ .Tag }}
